# SonarQube Quality Gate Configuration
# Defines rules, inclusions, and coverage properties for UI/API test automation codebases.

# Metadata
sonar.projectKey=playwright-automation-core
sonar.projectName=Playwright TS Automation & Strategy Reference Core
sonar.projectVersion=1.0.0

# Paths to source directories
sonar.sources=automation/ui/pages,automation/ui/tests,automation/api/controllers,automation/api/tests

# Exclusions
sonar.exclusions=node_modules/**,test-results/**,playwright-report/**

# Coding Standards & Quality Gates
sonar.language=ts
sonar.sourceEncoding=UTF-8

# Test Execution & Coverage Reports integration
sonar.tests=automation/ui/tests,automation/api/tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Custom rules enforcement
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1135
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.spec.ts
